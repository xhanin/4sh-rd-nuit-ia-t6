name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '@haiku') || contains(github.event.comment.body, '@sonnet'))) ||
      (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '@haiku') || contains(github.event.comment.body, '@sonnet'))) ||
      (github.event_name == 'pull_request_review' && (contains(github.event.review.body, '@haiku') || contains(github.event.review.body, '@sonnet'))) ||
      (github.event_name == 'issues' && ((contains(github.event.issue.body, '@haiku') || contains(github.event.issue.body, '@sonnet') || contains(github.event.issue.title, '@haiku') || contains(github.event.issue.title, '@sonnet'))))
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Run Claude Code
        uses: 4sh/4sh-github-actions/invoke-claude@icl-v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
#          jira_project_key: ECOM
#          jira_account_email: ${{ secrets.JIRA_EMAIL }}
#          jira_account_api_token: ${{ secrets.JIRA_API_TOKEN }}

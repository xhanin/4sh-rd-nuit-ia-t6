        <style>

                background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBuQHHKrWL1XnDwv_x4Hz5Uwh2ZUSdQ2wYkBBaiT_KAQkm-IU_1o0GZErkWdy9pq0Ik8_FO-mT5ZdJGdCmbyw7Q3SywctM2bulQkEL-x6QG6E_m1oehvi92SS9fOwDR1n_BQUOKWbnRH7qOic8gu73RlXOTeil2cKojcHq0wuZFqjqH6_LcNbFMhGQCNwaW6w1EyXKRunumspCyuGwSUBi1J9be_vIfERrC6DXMQGUgka9qdsUbZYHzrUi9A9-VF44zj7V3GH3K);

        class="wood-texture min-h-screen font-body text-on-background overflow-hidden select-none"

        <!-- TopAppBar -->
        <header
            class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-yellow-400 dark:bg-yellow-500 rounded-b-[3rem] border-b-8 border-amber-600/30 shadow-[0_8px_0_0_rgba(185,172,148,0.3)]"

                <span
                    class="text-amber-900 dark:text-amber-950 font-black italic text-3xl uppercase tracking-tight font-['Plus_Jakarta_Sans']"
                >
                    GAGNE TON PAPA
                </span>
            </div>
            <div class="flex items-center gap-6">
                <button
                    class="bg-white/40 p-3 rounded-full hover:scale-105 active:translate-y-1 transition-all duration-100 text-amber-900"
                >
                    <span
                        class="material-symbols-outlined text-4xl"
                        data-icon="timer"
                        >timer</span
                    >
                </button>
                <button
                    class="bg-white/40 p-3 rounded-full hover:scale-105 active:translate-y-1 transition-all duration-100 text-amber-900"
                >
                    <span
                        class="material-symbols-outlined text-4xl"
                        data-icon="settings"
                        >settings</span
                    >
                </button>
            </div>
        </header>
        <!-- SideNavBar (Toy Tray) -->

            class="fixed right-0 top-0 h-full z-40 flex flex-col items-center pt-32 pb-8 bg-orange-100 dark:bg-orange-200/20 w-44 rounded-l-[4rem] border-l-8 border-amber-600/20 shadow-[-10px_0_30px_rgba(54,46,28,0.06)] overflow-y-auto"
        >
            <div class="mb-6 text-center">
                <h2
                    class="text-amber-900 font-extrabold font-['Plus_Jakarta_Sans'] text-xl tracking-tight"
                >
                    INVENTAIRE
                </h2>
                <p class="text-on-surface-variant text-xs font-bold uppercase">
                    Solo Edition
                </p>
            </div>
            <div class="flex flex-col gap-6 items-center w-full px-4">
                <!-- Piece 1: L-Block -->
                <div
                    class="bg-blue-500 w-20 h-28 rounded-xl wooden-block-shadow flex items-center justify-center hover:scale-110 active:scale-95 transition-all cursor-grab"
                    title="L Block"
                >
                    <span
                        class="material-symbols-outlined text-white text-5xl"
                        data-icon="category"
                        >category</span
                    >
                </div>
                <!-- Piece 2: T-Block -->
                <div
                    class="bg-secondary w-24 h-20 rounded-xl wooden-block-shadow flex items-center justify-center hover:scale-110 active:scale-95 transition-all cursor-grab"
                    title="T Block"
                >
                    <span
                        class="material-symbols-outlined text-white text-5xl"
                        data-icon="change_history"
                        >change_history</span
                    >
                </div>
                <!-- Piece 3: Rectangle -->
                <div
                    class="bg-green-500 w-16 h-32 rounded-xl wooden-block-shadow flex items-center justify-center hover:scale-110 active:scale-95 transition-all cursor-grab"
                    title="Bar Block"
                >
                    <span
                        class="material-symbols-outlined text-white text-5xl"
                        data-icon="square"
                        >square</span
                    >
                </div>
                <!-- Piece 4: Small Block -->
                <div
                    class="bg-orange-500 w-20 h-20 rounded-xl wooden-block-shadow flex items-center justify-center hover:scale-110 active:scale-95 transition-all cursor-grab"
                    title="Box Block"
                >
                    <span
                        class="material-symbols-outlined text-white text-5xl"
                        data-icon="extension"
                        >extension</span
                    >
                </div>
                <!-- Piece 5: Pentagon -->
                <div
                    class="bg-primary-container w-24 h-24 rounded-full wooden-block-shadow flex items-center justify-center hover:scale-110 active:scale-95 transition-all cursor-grab"
                    title="Round Block"
                >
                    <span
                        class="material-symbols-outlined text-on-primary-container text-5xl"
                        data-icon="pentagon"
                        >pentagon</span
                    >
                </div>
            </div>
            <div class="mt-auto pt-8">
                <button
                    class="bg-blue-400 text-white font-black px-6 py-4 rounded-full shadow-inner scale-110 active:scale-90 transition-all uppercase tracking-widest text-lg"

                    VALIDER

                    <div
